<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Full Adoration — Formulaire">
  <title>Full Adoration — Formulaire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/experience.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" crossorigin="anonymous">
</head>
<body>
  <main id="main" class="experience" role="main">
    <div class="experience-content">
      <a href="index.html" class="experience-logo-link" aria-label="Retour à l'accueil">
        <img src="assets/ADORATION.png" alt="Full Adoration" class="experience-logo" width="200" height="75">
      </a>

      <form class="experience-form" action="#" method="post" novalidate>
        <div class="form-group">
          <label for="nom">Nom complet</label>
          <input
            type="text"
            id="nom"
            name="nom"
            autocomplete="name"
            required
            placeholder="Prénom et nom"
            pattern="[A-Za-zÀ-ÖØ-öø-ÿ ]{2,}"
            title="Entrez votre prénom et votre nom, uniquement avec les lettres de l'alphabet."
          >
        </div>
        <div class="form-group">
          <label for="telephone">Numéro de téléphone</label>
          <div class="phone-row">
            <div class="phone-select-wrap">
              <span class="phone-flag fi fi-cd" id="phone-flag" aria-hidden="true"></span>
              <select id="pays" name="pays" class="phone-select" aria-label="Choisir le pays" title="Choisir le pays">
                <option value="+33" data-flag="fr">🇫🇷</option>
                <option value="+32" data-flag="be">🇧🇪</option>
                <option value="+41" data-flag="ch">🇨🇭</option>
                <option value="+1" data-flag="us">🇺🇸</option>
                <option value="+44" data-flag="gb">🇬🇧</option>
                <option value="+34" data-flag="es">🇪🇸</option>
                <option value="+39" data-flag="it">🇮🇹</option>
                <option value="+221" data-flag="sn">🇸🇳</option>
                <option value="+242" data-flag="cg">🇨🇬</option>
                <option value="+243" data-flag="cd" selected>🇨🇩</option>
              </select>
            </div>
            <div class="phone-input-wrap">
              <span class="phone-prefix" id="phone-prefix" aria-hidden="true">+243</span>
              <span class="phone-zero" id="phone-zero" aria-hidden="true"></span>
              <input type="tel" id="telephone" autocomplete="tel" required placeholder="6 12 34 56 78" maxlength="10" inputmode="numeric" pattern="[0-9]{1,10}" title="10 chiffres maximum">
            </div>
            <input type="hidden" name="telephone" id="telephone-full">
          </div>
        </div>
        <button type="submit" class="experience-submit">Envoyer</button>
      </form>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    (function () {
      var input = document.getElementById('telephone');
      var nameInput = document.getElementById('nom');
      var select = document.getElementById('pays');
      var flagEl = document.getElementById('phone-flag');
      var prefixEl = document.getElementById('phone-prefix');
      var zeroEl = document.getElementById('phone-zero');
      var fullEl = document.getElementById('telephone-full');

      function getIndicatif() {
        return select && select.options[select.selectedIndex] ? select.options[select.selectedIndex].value : '+243';
      }

      function getFullDigits() {
        var withZero = zeroEl && zeroEl.textContent ? '0' : '';
        return (withZero + (input ? input.value.replace(/\D/g, '') : '')).slice(0, 10);
      }

      function updateDisplay() {
        if (flagEl) {
          var opt = select && select.options[select.selectedIndex];
          var code = opt ? opt.getAttribute('data-flag') : 'cd';
          flagEl.className = 'phone-flag fi fi-' + code;
        }
        if (prefixEl) prefixEl.textContent = getIndicatif();
        updateFull();
      }

      function updateFull() {
        if (fullEl) fullEl.value = getIndicatif() + getFullDigits();
      }

      function validateName() {
        if (!nameInput) return false;
        var value = (nameInput.value || '').trim();
        if (!value) return false;
        // Doit contenir au moins prénom + nom
        var parts = value.split(/\s+/);
        if (parts.length < 2) return false;
        // Uniquement lettres de l'alphabet (accents) et espaces
        var lettersOnly = /^[A-Za-zÀ-ÖØ-öø-ÿ ]+$/;
        return lettersOnly.test(value);
      }

      if (input && zeroEl) {
        input.addEventListener('input', function () {
          var raw = (zeroEl.textContent ? '0' : '') + this.value.replace(/\D/g, '');
          var digits = raw.slice(0, 10);
          if (digits.charAt(0) === '0') {
            zeroEl.textContent = '(0)';
            this.value = digits.slice(1);
            this.setAttribute('maxlength', 9);
          } else {
            zeroEl.textContent = '';
            this.value = digits;
            this.setAttribute('maxlength', 10);
          }
          updateFull();
        });
      }
      if (nameInput) {
        nameInput.addEventListener('input', function () {
          var val = this.value || '';
          // Supprime tout ce qui n'est pas lettre (avec accents) ou espace
          val = val.replace(/[^A-Za-zÀ-ÖØ-öø-ÿ ]+/g, '');
          // Normalise les espaces
          val = val.replace(/\s+/g, ' ');
          this.value = val;
        });
      }
      if (select) {
        select.addEventListener('change', updateDisplay);
        updateDisplay();
      }

      /** Reprend nom + téléphone déjà enregistrés (même source que la page Paramètres) */
      function applyStoredPhone(storedRaw) {
        if (!storedRaw || !select || !input || !zeroEl) return;
        var stored = String(storedRaw).trim().replace(/\s/g, '');
        if (!stored) return;
        if (stored.charAt(0) !== '+') {
          var digitsOnly = stored.replace(/\D/g, '');
          if (digitsOnly.length >= 9) stored = '+' + digitsOnly;
          else return;
        }
        var prefixes = [];
        for (var i = 0; i < select.options.length; i++) {
          prefixes.push({ value: select.options[i].value, index: i });
        }
        prefixes.sort(function (a, b) {
          return b.value.length - a.value.length;
        });
        for (var j = 0; j < prefixes.length; j++) {
          var pv = prefixes[j].value;
          if (stored.indexOf(pv) === 0) {
            var rest = stored.slice(pv.length).replace(/\D/g, '');
            select.selectedIndex = prefixes[j].index;
            updateDisplay();
            if (rest.charAt(0) === '0') {
              zeroEl.textContent = '(0)';
              input.value = rest.slice(1, 11);
              input.setAttribute('maxlength', 9);
            } else {
              zeroEl.textContent = '';
              input.value = rest.slice(0, 10);
              input.setAttribute('maxlength', 10);
            }
            updateFull();
            return;
          }
        }
      }

      function initFromStorage() {
        try {
          var savedName = localStorage.getItem('full-adoration-name');
          if (nameInput && savedName) nameInput.value = savedName;
        } catch (e) {}
        try {
          var savedPhone = localStorage.getItem('full-adoration-phone');
          if (savedPhone) applyStoredPhone(savedPhone);
        } catch (e2) {}
      }

      initFromStorage();

      function validatePhone() {
        if (!input) return false;
        var digits = getFullDigits();
        // On exige au moins 9 chiffres réels (ex. 0X XX XX XX XX)
        if (digits.length < 9) {
          return false;
        }
        updateFull();
        return true;
      }
      var form = document.querySelector('.experience-form');

      function showFormErrorModal() {
        if (typeof window.showAppModal !== 'function') return;
        window.showAppModal({
          title: 'Champs requis',
          messageHtml:
            '<p><strong>Prénom + nom</strong> et <strong>numéro</strong> valides (9 chiffres min.).</p>',
          variant: 'error'
        });
      }

      if (form) {
        form.addEventListener('submit', function (e) {
          e.preventDefault();

          // Validation HTML5 + téléphone (pop-up globale .app-pop)
          if (!form.checkValidity || !form.checkValidity() || !validateName() || !validatePhone()) {
            showFormErrorModal();
            return;
          }

          if (fullEl) fullEl.value = getIndicatif() + getFullDigits();
          if (nameInput && nameInput.value) {
            try {
              localStorage.setItem('full-adoration-name', nameInput.value.trim());
            } catch (err) {}
          }
          /* Même clé que Paramètres : modifier le numéro partout depuis le profil */
          if (fullEl && fullEl.value) {
            try {
              localStorage.setItem('full-adoration-phone', fullEl.value.trim());
            } catch (err2) {}
          }
          window.location.href = 'accueil.html';
        });
      }
    })();
  </script>
</body>
</html>
